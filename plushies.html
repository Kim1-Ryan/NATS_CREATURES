<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plushies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        
        body {
            display: flex;
            flex-direction: column;
            background-color: #ba8cbe;
            background-size: cover;
            text-align: center;
        }
        
        #header {
            display: flex;
            flex-wrap: wrap !important;
            justify-content: center;
        }
        
        @media (max-width: 768px) {
            .headerBranding img {
                height: 80px;
            }
        }
        
        .name {
            color: #fffcd1;
            font-family: "Lilita One", sans-serif;
            font-weight: bold;
        }
        
        #mainName {
            font-size: 600%;
            padding-top: 6px;
            margin: 1%;
        }
        
        #hero {
            background-color: #4f2962;
            width: 70%;
            margin: 1%;
            align-self: center;
            border: 5px dashed #ff6c8f;
            border-radius: 30%;
            text-align: center;
            padding: 1.5%;
        }
        
        .col-lg-6 {
            width: 100%;
            margin: 2%;
            font-family: "Lilita One", sans-serif;
            font-weight: bold;
        }
        
        /* pc button styles */
        .text-body-secondary {
            display: inline-flex !important;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 150px; 
            height: 150px; 
            padding: 10px !important; 
            text-align: center;
            text-decoration: none;
            border: 6px solid #ba8cbe;
            background-color: #9172a2;
            border-radius: 50% !important; 
        }
        
        .text-body-secondary:hover {
            background-color: #ffc107;
        }
        
        .text-body-secondary h3 {
            margin: 0;
            padding: 0;
            font-size: 1.2rem;
            color: #fffcd1;
        }
        
        .d-grid {
            display: flex !important;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }
        
        /* Tablet Screens */
        @media (max-width: 992px) {
            #mainName {
                font-size: 480%;
            }
            .d-grid {
                gap: 20px;
            }
            .text-body-secondary {
                width: 130px; /* make divs even smaller on smaller screens */
                height: 130px;
            }
            .text-body-secondary h3 {
                font-size: 1.1rem;
            }
        }
        
        /* Mobile Screens */
        @media (max-width: 768px) {
            #hero {
                width: 90%;
                margin: 10px auto; 
                border-radius: 30px; 
                padding: 1rem;
            }
            #mainName {
                font-size: 300%;
                margin-top: 2%;
            }
            .col-lg-6 {
                width: 100%;
                margin: 0 auto;
            }
            .d-grid {
                flex-direction: column; /* stacks items vertically on phone screens */
                align-items: center;
                gap: 15px;
            }
            .text-body-secondary {
                width: 120px; /* smaller on mobile */
                height: 120px;
            }
        }
        
        #footer {
            width: 100%;
            text-align: center;
        }
        
        #footer span {
            font-size: 160%;
            color: #1f1a32;
            text-shadow: 2px 2px 4px #4f2962;
            font-family: "Lilita One", sans-serif;
            font-weight: bold;
        }

    </style>
    
</head>
<body>
    
    <!--header-->
    <div class="container"> 
        <header id="header" class="d-flex flex-wrap py-4"> 
            
            <!--header, logo-->
            <div class="headerBranding">
                <a href="./catalogue.html" class="d-flex align-items-center text-decoration-none"> 
                    
                    <img src="./logo.png" alt="Nat's Creatures Logo" height="230">
                </a>
            </div>
        
        </header>
    </div>

    <!--centered hero-->
    <div id="hero"> 
        <h1 id="mainName" class="name">Plushies</h1> 
        <div class="col-lg-6 mx-auto">             
            <div class="d-grid p-3 d-sm-flex justify-content-sm-center text-decoration-none">
                
                <a id="category" class="text-body-secondary align-content-center" href="./animals.html">
                    <h3>Animals</h3>
                    <!-- <img src="" width=""/> -->
                </a>

                <a id="category" class="text-body-secondary align-content-center" href="./bugs.html">
                    <h3>Bugs & Critters</h3>
                    <!-- <img src="" width=""/>  -->
                </a>

                <a id="category" class="text-body-secondary align-content-center" href="./fantasy.html">
                    <h3>Fantasy</h3>
                    <!-- <img src="" width=""/>  -->
                </a>

                <a id="category" class="text-body-secondary align-content-center" href="./pop-char.html">
                    <h3>Popular peeps</h3>
                    <!-- <img src="" width=""/>  -->
                </a>
            
            </div> 
        
        </div> 
    </div>

    <!--footer-->
    <div class="container"> 
        
        <footer id="footer" class="d-flex justify-content-center py-2 my-4"> 
            
            <!--footer left-->
            <div class="d-flex align-items-center"> 
                <a href="https://www.facebook.com/share/182buaeSmq/" class="me-2 mb-md-0 text-decoration-none"> 
                    <img id="footerLogo" src="./logo.png" alt="logo" height="50"> 
                </a> 
                <span class="name mb-md-0">© NAT'S CREATURES</span> 
            </div> 
        
        </footer> 
    
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
